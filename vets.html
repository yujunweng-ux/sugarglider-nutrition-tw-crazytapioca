    --line: rgba(110,95,70,0.22);
    --text:#453b2c;
    --muted:#8c8069;
    --pink:#cf7a89;
    --pink-soft: rgba(207,122,137,0.22);
    --mint:#7d9473;
    --mint-soft: rgba(125,148,115,0.18);
    --coral:#c1704f;
    --gold:#b3874a;
    --radius: 18px;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    background: var(--bg-page);
    color: var(--text);
    font-family:'Noto Sans TC', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body{
    min-height:100vh;
    background: linear-gradient(180deg, var(--bg-page) 0%, var(--bg-page-2) 100%);
    background-attachment: fixed;
  }
  .wrap{
    max-width: 1080px;
    margin: 0 auto;
    padding: clamp(24px, 5vw, 56px) clamp(18px, 5vw, 32px) 60px;
  }
  .brand-logo{
    display:flex;
    justify-content:center;
    margin-bottom: 18px;
  }
  .brand-logo img{
    width: 100%;
    max-width: 260px;
    height: auto;
    display: block;
  }

  .back-link{
    display:inline-flex; align-items:center;
    font-family:'TearsFont', 'Noto Sans TC', sans-serif;
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    background: var(--option-bg);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 16px;
    transition: all .15s ease;
  }
  .back-link:hover{
    color: var(--pink);
    border-color: var(--pink);
  }

  .hero{ text-align:center; margin-bottom: 28px; }
  .hero .back-link{ margin-top: 16px; }
  .hero h1{
    font-family:'PangXiFont', 'Fredoka', sans-serif;
    font-weight:600;
    font-size: clamp(24px, 4.5vw, 34px);
    margin: 0 0 12px;
  }
  .hero h1 .accent{ color: var(--pink); }
  .hero p{
    color: var(--muted);
    font-size: 14px;
    max-width: 640px;
    margin: 0 auto;
    line-height: 1.8;
  }

  .card{
    background: linear-gradient(180deg, var(--card), var(--card-2));
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: clamp(20px, 3.5vw, 30px);
    box-shadow: 0 14px 34px -18px rgba(110,90,55,0.28);
    margin-bottom: 24px;
  }
  .card h2{
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size: 18px;
    margin: 0 0 4px;
  }
  .card .sub{
    color: var(--muted);
    font-size: 13px;
    margin: 0 0 18px;
  }

  /* ---------- County list ---------- */
  .county-section{
    margin-bottom: 22px;
    scroll-margin-top: 20px;
  }
  .county-section:last-child{ margin-bottom: 0; }
  .county-title{
    display:flex;
    align-items:center;
    gap: 10px;
    font-family:'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 16px;
    margin: 0 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px dashed var(--line);
    transition: color .3s ease;
  }
  .county-title .count{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }
  .county-section.highlight .county-title{ color: var(--pink); }

  .vet-item{
    background: var(--option-bg);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 10px;
  }
  .vet-item:last-child{ margin-bottom: 0; }
  .vet-item a.vet-name{
    display:inline-flex;
    align-items:center;
    gap: 6px;
    font-family:'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 14.5px;
    color: var(--text);
    text-decoration:none;
    border-bottom: 1.5px solid var(--pink);
  }
  .vet-item a.vet-name:hover{ color: var(--pink); }
  .vet-item .vet-meta{
    margin-top: 6px;
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.7;
  }
  .vet-item .vet-meta .phone{
    font-family:'JetBrains Mono', monospace;
    color: var(--text);
  }

  .filter-row{
    display:flex;
    flex-wrap:wrap;
    gap: 8px;
    margin-bottom: 22px;
  }
  .filter-row button{
    font-family:'Noto Sans TC', sans-serif;
    font-size: 12.5px;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--option-bg);
    color: var(--muted);
    cursor:pointer;
    transition: all .15s ease;
  }
  .filter-row button:hover{ border-color: var(--pink); color: var(--pink); }
  .filter-row button.active{
    background: var(--pink-soft);
    border-color: var(--pink);
    color: var(--pink);
    font-weight: 600;
  }

  .site-footer{
    margin-top: 10px;
    padding-top: 18px;
    border-top: 1px dashed var(--line);
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }

  @keyframes flashHighlight{
    0%, 100% { background: var(--card); }
    30% { background: var(--pink-soft); }
  }
  .county-section.flash{ animation: flashHighlight 1s ease; border-radius: 12px; }
</style>
</head>

  const listContainer = document.getElementById('listContainer');
  const filterRow = document.getElementById('filterRow');
  const totalCount = document.getElementById('totalCount');

  // 依縣市分組，並保留原始出現順序（大致依地理位置北到南）
  const countyOrder = [];
  const grouped = {};
  vetData.forEach(v=>{
    if(!grouped[v.county]){ grouped[v.county] = []; countyOrder.push(v.county); }
    grouped[v.county].push(v);
  });

  totalCount.textContent = vetData.length;

  function mapsUrl(query){
    return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(query);
  }

  function renderList(){
    listContainer.innerHTML = '';
    countyOrder.forEach(county=>{
      const section = document.createElement('div');
      section.className = 'county-section';
      section.id = 'county-' + county;

      const items = grouped[county].map(v => `
        <div class="vet-item">
          <a class="vet-name" href="${mapsUrl(v.name)}" target="_blank" rel="noopener">${v.name} ↗</a>
          <div class="vet-meta"><span class="phone">${v.phone}</span> ・ ${v.addr}</div>
        </div>
      `).join('');

      section.innerHTML = `
        <div class="county-title">${county} <span class="count">(${grouped[county].length})</span></div>
        ${items}
      `;
      listContainer.appendChild(section);
    });
  }
  renderList();

  // 篩選按鈕（含「全部」）
  function renderFilters(){
    filterRow.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.textContent = '全部地區';
    allBtn.className = 'active';
    allBtn.addEventListener('click', ()=>{
      document.querySelectorAll('.filter-row button').forEach(b=>b.classList.remove('active'));
      allBtn.classList.add('active');
      document.querySelectorAll('.county-section').forEach(s=> s.style.display = 'block');
    });
    filterRow.appendChild(allBtn);

    countyOrder.forEach(county=>{
      const btn = document.createElement('button');
      btn.textContent = county;
      btn.addEventListener('click', ()=>{
        document.querySelectorAll('.filter-row button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.county-section').forEach(s=>{
          s.style.display = (s.id === 'county-' + county) ? 'block' : 'none';
        });
      });
      filterRow.appendChild(btn);
    });
  }
  renderFilters();
</script>
